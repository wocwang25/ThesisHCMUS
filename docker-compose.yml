services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: debackx-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  gateway:
    build:
      context: ./services/gateway
    container_name: debackx-gateway
    environment:
      PORT: 3000
      MONGO_URL: ${MONGO_URL:?Set MONGO_URL in .env to your MongoDB Atlas connection string}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      UPLOAD_DIR: /app/uploads
      REQUEST_QUEUE: image.translate.requested
      COMPLETION_QUEUE: image.translate.completed
      CLIENT_ORIGIN: http://localhost:5173
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./services/worker
    container_name: debackx-worker
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      UPLOAD_DIR: /app/uploads
      REQUEST_QUEUE: image.translate.requested
      COMPLETION_QUEUE: image.translate.completed
      WORKER_NAME: debackx-worker-1
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
    container_name: debackx-web
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  uploads:
